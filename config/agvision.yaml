# Agriculture-Vision + SegFormer (ViT) + YOLO26

data:
  root: data/agvision
  version_dir: Agriculture-Vision-2021
  tile_size: 512
  max_train_samples: null
  max_val_samples: 1000

segmentation:
  model_id: nvidia/segformer-b4-finetuned-ade-512-512
  num_labels: 2
  epochs: 40
  batch_size: 11
  val_batch_size: 2
  gradient_accumulation_steps: 2
  num_workers: 4
  gradient_checkpointing: true
  prefetch_factor: 2
  persistent_workers: true
  learning_rate: 5.0e-5
  weight_decay: 0.01
  cosine_lr: true
  label_smoothing: 0.05
  fp16: true
  dice_weight: 0.4
  foreground_weight: 3.0
  val_threshold: 0.5
  val_tta: false
  final_tta: true
  compile: false
  cudnn_benchmark: true
  # false = новое обучение с нуля (рекомендуется после смены аугментаций)
  # true  = продолжить с best_iou.pth
  resume: false
  backup_before_train: true
  early_stop_patience: 10
  output_dir: model/weights

  # 4 канала: NIR,R,G,B + шум + принудительная опора на NIR
  augmentation:
    enabled: true
    p_noise: 0.5
    p_blur: 0.35
    p_brightness: 0.5
    p_rgb_dropout: 0.15
    p_nir_noise: 0.45
    noise_std_rgb: 0.045
    noise_std_nir: 0.035
    nir_gain: [0.82, 1.18]

detection:
  model: yolo26s.pt
  imgsz: 640
  epochs: 80
  batch: 16
  conf: 0.25
  match_distance_px: 25
  dataset_dir: outputs/yolo_pseudo
  output_dir: outputs/yolo26

pseudo:
  tree_area_min: 50
  tree_area_max: 800
  pole_aspect_min: 3.0
  pole_width_max: 15

metrics:
  report_path: outputs/metrics_report.json

tz_targets:
  iou_mean: 0.90
  precision_mean: 0.90
  recall_mean: 0.95
  f1_macro: 0.80
